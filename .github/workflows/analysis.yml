name: Static Analysis
on: [push, pull_request]
permissions:
  contents: read

jobs:
  static_analysis:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module-dir: ['v3.3/glfw', 'v3.4/glfw']

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    - uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    - name: Install analysis tools
      run: |
        go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
        go install honnef.co/go/tools/cmd/staticcheck@latest

    - name: Get dependencies
      run: sudo apt-get update && sudo apt-get install gcc libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev libx11-dev xorg-dev libwayland-dev libxkbcommon-dev wayland-protocols

    - name: Vet
      run: |
        cd "${{ matrix.module-dir }}" && go vet ./...

    - name: Formatting
      run: |
        cd "${{ matrix.module-dir }}" && test -z "$(gofmt -e -d . | tee /dev/stderr)"

    - name: Gocyclo
      run: |
        cd "${{ matrix.module-dir }}" && gocyclo -over 30 .

    - name: Staticcheck
      run: |
        cd "${{ matrix.module-dir }}" && staticcheck ./...
